<dialog #dialog class="app-modal" (click)="onBackdropClick($event)" (close)="onClose()">
  <div class="flex max-h-[calc(100vh-6rem)] flex-col rounded-xl border bg-background text-foreground shadow-xl">
    <header class="flex items-center justify-between gap-4 border-b px-5 py-3">
      <h2 class="text-lg font-semibold">{{ title() }}</h2>
      <button
        type="button"
        class="text-2xl leading-none text-muted-foreground hover:text-foreground"
        (click)="close()"
        aria-label="Close"
      >
        ×
      </button>
    </header>
    <div class="min-h-0 flex-1 overflow-y-auto p-5">
      <ng-content />
    </div>
  </div>
</dialog>
