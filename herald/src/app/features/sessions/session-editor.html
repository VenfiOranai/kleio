@if (session()) {
  <div class="flex flex-col gap-4">
    <div class="flex items-center justify-between">
      @if (!embedded()) {
        <a
          [routerLink]="['/campaigns', campaignId()]"
          class="text-sm text-muted-foreground hover:underline"
        >
          ← Back to campaign
        </a>
      } @else {
        <span></span>
      }
      <div class="flex items-center gap-2">
        @if (saved()) {
          <span class="text-sm text-muted-foreground">Saved</span>
        }
        <button z-button zType="ghost" zSize="sm" (click)="remove()">Delete</button>
        <button z-button zSize="sm" (click)="save()">Save</button>
      </div>
    </div>

    <form class="flex flex-col gap-3" [formGroup]="form">
      <input z-input placeholder="Session title" formControlName="title" />
      <input z-input type="date" class="w-fit" formControlName="session_date" />

      @if (embedded()) {
        <!-- Tight on space in the workspace: tab between panes instead of stacking them. -->
        <!-- type="button" on each: these live inside the session <form>, and z-button has no
             default type (native "submit"), so Enter in a field would otherwise activate the
             first one and switch tabs. -->
        <div class="flex w-fit items-center gap-1 rounded-lg border p-1">
          <button
            z-button
            type="button"
            zSize="sm"
            [zType]="tab() === 'write' ? 'secondary' : 'ghost'"
            (click)="tab.set('write')"
          >
            Write
          </button>
          <button
            z-button
            type="button"
            zSize="sm"
            [zType]="tab() === 'preview' ? 'secondary' : 'ghost'"
            (click)="tab.set('preview')"
          >
            Preview
          </button>
          <button
            z-button
            type="button"
            zSize="sm"
            [zType]="tab() === 'summary' ? 'secondary' : 'ghost'"
            (click)="tab.set('summary')"
          >
            Summary
          </button>
          <button
            z-button
            type="button"
            zSize="sm"
            [zType]="tab() === 'ask' ? 'secondary' : 'ghost'"
            (click)="tab.set('ask')"
          >
            Ask
          </button>
        </div>

        @switch (tab()) {
          @case ('write') {
            <ng-container [ngTemplateOutlet]="notesPane" />
          }
          @case ('preview') {
            <ng-container [ngTemplateOutlet]="previewPane" />
          }
          @case ('summary') {
            <ng-container [ngTemplateOutlet]="summaryPane" />
          }
          @case ('ask') {
            <ng-container [ngTemplateOutlet]="askPane" />
          }
        }
      } @else {
        <div class="grid gap-4 md:grid-cols-2">
          <ng-container [ngTemplateOutlet]="notesPane" />
          <ng-container [ngTemplateOutlet]="previewPane" />
        </div>
        <ng-container [ngTemplateOutlet]="summaryPane" />
      }

      <!-- Panes are declared inside the form so formControlName resolves the form group,
           and reused across the embedded (tabbed) and full-page (split) layouts. -->
      <ng-template #notesPane>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Raw notes (Markdown)</label>
          <app-mention-textarea
            [rows]="18"
            placeholder="# Session notes&#10;What happened... (type @ to tag a name, place, …)"
            [entities]="entities()"
            (create)="onCreateEntity($event)"
            formControlName="raw_notes"
          />
        </div>
      </ng-template>

      <ng-template #previewPane>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Preview</label>
          <div class="min-h-40 rounded-lg border p-3">
            <app-markdown-view [source]="rawNotes()" />
          </div>
        </div>
      </ng-template>

      <ng-template #summaryPane>
        <div class="flex flex-col gap-1">
          <div class="flex items-center justify-between gap-2">
            <label class="text-sm font-medium">AI summary</label>
            <button
              z-button
              type="button"
              zType="outline"
              zSize="sm"
              [zLoading]="summarizing()"
              [zDisabled]="summarizing()"
              (click)="summarize()"
            >
              {{ summarizing() ? 'Summarizing…' : 'Summarize with AI' }}
            </button>
          </div>
          @if (summary()) {
            <div class="rounded-lg border bg-muted/30 p-3">
              <app-markdown-view [source]="summary()" />
            </div>
          }
          <textarea
            z-input
            rows="6"
            class="font-mono text-sm"
            placeholder="Generate a summary from your notes, or write one yourself…"
            formControlName="summary"
          ></textarea>
          @if (summarizeError()) {
            <p class="text-sm text-destructive">{{ summarizeError() }}</p>
          }
        </div>
      </ng-template>

      <!-- Campaign-scoped Q&A over notes — independent of the current session, embedded so it
           has no page chrome. Ask uses a [formGroup] div (not a <form>) so it nests validly. -->
      <ng-template #askPane>
        <app-ask [campaignId]="campaignId()" [embedded]="true" />
      </ng-template>
    </form>
  </div>
}
