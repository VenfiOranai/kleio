name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  oracle:
    name: Oracle (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oracle
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: kleio
          POSTGRES_PASSWORD: kleio
          POSTGRES_DB: kleio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kleio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://kleio:kleio@localhost:5432/kleio

  herald:
    name: Herald (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herald
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: herald/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx ng build
