name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  oracle:
    name: Oracle (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oracle
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: kleio
          POSTGRES_PASSWORD: kleio
          POSTGRES_DB: kleio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kleio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://kleio:kleio@localhost:5432/kleio

  herald:
    name: Herald (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herald
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: herald/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx ng build

  e2e:
    name: Herald e2e (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: kleio
          POSTGRES_PASSWORD: kleio
          POSTGRES_DB: kleio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kleio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Consumed by the oracle (via alembic + the Playwright webServer) and the herald proxy.
      DATABASE_URL: postgresql+psycopg://kleio:kleio@localhost:5432/kleio
      # Playwright starts the oracle with the system interpreter (no venv in CI).
      ORACLE_PYTHON: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install oracle
        working-directory: oracle
        run: pip install -e ".[dev]"
      - name: Apply migrations
        working-directory: oracle
        run: python -m alembic upgrade head
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: herald/package-lock.json
      - name: Install herald dependencies
        working-directory: herald
        run: npm ci
      - name: Install Playwright browsers
        working-directory: herald
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: herald
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: herald/playwright-report/
          retention-days: 7
