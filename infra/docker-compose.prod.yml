# Production stack for a single EC2 host. Run from the repo root on the server:
#   docker compose -f infra/docker-compose.prod.yml up -d --build
# Reads secrets from infra/.env (gitignored) — see infra/.env.example.
services:
  db:
    # pgvector image (Postgres 17 + the `vector` extension) for RAG embeddings — Phase 5.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  oracle:
    build: ../oracle
    restart: unless-stopped
    # Apply migrations, then serve. No host port — only reachable via the herald proxy.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      # AI (Gemini): summarization + RAG Q&A. Without a key those endpoints return 503.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
    depends_on:
      db:
        condition: service_healthy

  herald:
    build:
      context: ../herald
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - oracle

volumes:
  pgdata:
