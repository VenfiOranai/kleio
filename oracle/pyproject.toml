[project]
name = "oracle"
version = "0.1.0"
description = "Kleio backend — FastAPI service (the Oracle)"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "sqlalchemy>=2.0",
  "psycopg[binary]>=3.2",
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  "alembic>=1.14",
  "pyjwt>=2.9",
  "bcrypt>=4.2",
  "google-genai>=1.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "httpx>=0.27",
  "ruff>=0.8",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Autogenerated Alembic migrations are not hand-formatted.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# We don't maintain `__all__`; re-export modules just import names. Ignore
# "imported but unused" (F401) in those files so re-exports don't need `__all__`.
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"app/api/deps.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
